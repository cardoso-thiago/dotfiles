# This is for Montreal, find your city at https://openweathermap.org
# The id will be the last part of the URL
city_id = "3448439"

# Output format, using Handlebars syntax, meaning variables should be used like {{ this }}
# Available tokens are:
# - temp_celcius
# - temp_kelvin
# - temp_fahrenheit
# - temp_icon
# - trend
# - forecast_celcius
# - forecast_kelvin
# - forecast_fahrenheit
# - forecast_icon
display = "{{ temp_icon }} {{ temp_celcius }}°C {{ forecast_icon }} {{ forecast_celcius }}°C"

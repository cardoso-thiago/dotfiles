[module/previous]
type = custom/ipc
format-font = 3
; Default
hook-0 = echo ""
; When spotify active
hook-1 = echo оҒ”
click-left = "spotifyctl -q previous"

[module/next]
type = custom/ipc
format-font = 3
; Default
hook-0 = echo ""
; When spotify active
hook-1 = echo оҒҡ
click-left = "spotifyctl -q next"

[module/playpause]
type = custom/ipc
format-font = 3
; Default
hook-0 = echo ""
; Playing
hook-1 = echo оҒҷ
; Paused
hook-2 = echo оҒҳ
click-left = "spotifyctl -q playpause"

[module/spotify]
type = custom/ipc
; Default
hook-0 = echo ""
; Playing/paused show song name and artist
hook-1 = echo "оғҫ" $(spotifyctl -q status --format '%artist%: %title%')

[module/info-trash]
type = custom/script
exec = ~/.config/polybar/hack/scripts/info-trash.sh
interval = 60
click-left = xdg-open ~/.local/share/Trash/files &
click-right = ~/.config/polybar/hack/scripts/info-trash.sh --clean &
format-prefix = "оҮҰ "

[module/weather]
type = custom/script
exec = ~/.config/polybar-forecast/polybar-forecast-linux-x86_64
exec-if = ping openweathermap.org -c 1
interval = 600
label-font = 1

[module/polywins]
type = custom/script
exec = ~/.config/polybar/hack/scripts/polywins.sh 2>/dev/null
format = <label>
label = %output%
label-padding = 1
tail = true

[module/pulseaudio-control]
type = custom/script
tail = true
label-foreground = ${colors.foreground}
exec = pulseaudio-control --icons-volume "оҲғ " --icon-muted "оҲӮ " --sink-nicknames-from "device.description" --sink-nickname "alsa_output.pci-0000_00_1f.3.analog-stereo:оҮҳ Speakers" --sink-nickname "bluez_sink.0C_A6_94_6F_25_67.a2dp_sink:оҖӢ Sony" listen
click-right = exec pavucontrol &
click-left = pulseaudio-control togmute
; click-middle = pulseaudio-control --sink-blacklist "alsa_output.pci-0000_01_00.1.hdmi-stereo-extra2" next-sink
click-middle = pulseaudio-control next-sink
scroll-up = pulseaudio-control --volume-max 100 up
scroll-down = pulseaudio-control --volume-max 100 down

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/hack/scripts/rofi-bluetooth.sh --status
interval = 1
click-left = ~/.config/polybar/hack/scripts/rofi-bluetooth.sh &